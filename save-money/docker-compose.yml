services:
  postgres:
    image: postgres:17-alpine
    container_name: save-money-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-save_money}
      POSTGRES_USER: ${POSTGRES_USER:-save_money_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-save_money_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-save_money_user} -d ${POSTGRES_DB:-save_money}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
